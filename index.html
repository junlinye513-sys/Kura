<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>K-Log</title>
    <style>
        :root {
            --washi: #F8F4E6;
            --sumi: #333333;
            --torii: #D24D3E;
            --indigo: #2C3E50;
        }

        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
            user-select: none; 
            touch-action: manipulation; 
        }

        body {
            margin: 0; background: var(--washi);
            color: var(--sumi); font-family: -apple-system, sans-serif;
            display: flex; justify-content: center;
        }

        #app {
            width: 100%; max-width: 420px; min-height: 100vh;
            display: flex; flex-direction: column; padding: 40px 25px;
        }

        .gacha-info {
            display: flex; justify-content: space-between; 
            font-size: 0.75rem; letter-spacing: 2px; color: var(--indigo);
            margin-bottom: 10px; opacity: 0.8; font-weight: bold;
        }
        .progress-track {
            height: 3px; width: 100%; background: #E0E0E0;
            margin-bottom: 50px; border-radius: 2px;
        }
        #progressBar { height: 100%; background: var(--torii); width: 0%; transition: 0.4s; }

        .matrix {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px 20px;
        }

        .circle {
            position: relative; width: 100%; aspect-ratio: 1;
            border-radius: 50%; background: #FFF; border: 1.5px solid #DDD;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; font-weight: 500; transition: transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02); cursor: pointer;
        }
        .circle:active { transform: scale(0.9); }
        .circle.active { border-color: var(--torii); color: var(--torii); border-width: 2.5px; font-weight: 800; }

        .badge {
            position: absolute; top: -5px; right: -5px;
            background: var(--torii); color: #FFF; font-size: 0.75rem;
            width: 22px; height: 22px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
        }
        .active .badge { display: flex; }

        .footer {
            margin-top: auto; padding-top: 40px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .total-val { font-size: 3.8rem; font-weight: 900; color: var(--indigo); letter-spacing: -3px; line-height: 1; }
        .total-val::before { content: "$"; font-size: 1.5rem; font-weight: 300; vertical-align: top; margin-right: 5px; color: #BBB; }
        
        .action-group { display: flex; gap: 15px; }
        .icon-btn {
            width: 50px; height: 50px; border-radius: 15px;
            border: 1.5px solid #DDD; background: #FFF;
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; color: #888; cursor: pointer;
        }
        .btn-clear { color: #BBB; border-style: dashed; }

        .screenshot-mode { background: #FFF !important; }
        .screenshot-mode .progress-track, .screenshot-mode .gacha-info, .screenshot-mode .action-group { display: none; }
        .screenshot-mode .circle:not(.active) { opacity: 0.1; }
        .screenshot-mode .circle.active { border-color: #000 !important; color: #000 !important; }
        .screenshot-mode .badge { background: #000; }
        .screenshot-mode .total-val { color: #000; }
    </style>
</head>
<body>

<div id="app">
    <div class="gacha-info">
        <span id="nextText">NEXT: 5 PLATES</span>
        <span id="drawText">0 DRAWS</span>
    </div>
    <div class="progress-track"><div id="progressBar"></div></div>

    <div class="matrix" id="matrix"></div>

    <div class="footer">
        <div class="total-val" id="total">0</div>
        <div class="action-group">
            <button class="icon-btn btn-clear" onclick="resetData()">清</button>
            <button class="icon-btn" onclick="toggleMode()">📷</button>
        </div>
    </div>
</div>

<script>
    const prices = [30, 40, 50, 60, 80, 90, 100, 130, 180];
    let data = JSON.parse(localStorage.getItem('kura_v5_pro')) || {};
    prices.forEach(p => { if(!data[p]) data[p] = 0; });

    let isTouching = false; // 用來精準判斷目前是否在手機上

    function render() {
        const m = document.getElementById('matrix');
        m.innerHTML = '';
        prices.forEach(p => {
            const div = document.createElement('div');
            div.className = `circle ${data[p] > 0 ? 'active' : ''}`;
            div.innerHTML = `${p}<div class="badge">${data[p]}</div>`;
            
            let timer;
            let isLongPress = false;

            // 📱 手機端邏輯
            div.addEventListener('touchstart', (e) => {
                isTouching = true; 
                isLongPress = false;
                timer = setTimeout(() => {
                    isLongPress = true;
                    update(p, -1); // 手機長按扣除
                    if (navigator.vibrate) navigator.vibrate(50);
                }, 600);
            }, {passive: true});

            div.addEventListener('touchend', (e) => {
                clearTimeout(timer);
                if (!isLongPress) update(p, 1); // 手機短按增加
                if (e.cancelable) e.preventDefault(); // 阻擋點擊穿透
            });

            div.addEventListener('touchcancel', () => clearTimeout(timer));

            // 💻 電腦端邏輯
            div.addEventListener('mousedown', (e) => {
                if (isTouching) return; // 如果是手機，直接忽略滑鼠事件
                if (e.button === 0) update(p, 1); // 電腦左鍵增加
            });

            div.addEventListener('contextmenu', (e) => {
                e.preventDefault(); // 永遠擋住系統右鍵選單
                if (!isTouching) update(p, -1); // 電腦右鍵直接扣除
            });

            m.appendChild(div);
        });
        calculate();
    }

    function update(p, d) {
        data[p] = Math.max(0, data[p] + d);
        localStorage.setItem('kura_v5_pro', JSON.stringify(data));
        render();
    }

    function calculate() {
        let total = 0, plates = 0;
        prices.forEach(p => {
            total += p * data[p];
            plates += (p === 80 ? 2 : 1) * data[p];
        });

        document.getElementById('total').innerText = total.toLocaleString();
        
        const currentCycle = plates % 5;
        const totalDraws = Math.floor(plates / 5);
        const remain = 5 - currentCycle;

        document.getElementById('progressBar').style.width = (currentCycle / 5 * 100) + '%';
        document.getElementById('nextText').innerText = (currentCycle === 0 && plates > 0) ? "READY TO DRAW" : `NEXT: ${remain} PLATES`;
        document.getElementById('drawText').innerText = `${totalDraws} DRAWS`;
    }

    window.toggleMode = () => document.body.classList.toggle('screenshot-mode');

    window.resetData = () => {
        if(confirm('確定要清空今日紀錄嗎？')) {
            data = {}; 
            prices.forEach(p => data[p] = 0);
            localStorage.removeItem('kura_v5_pro');
            render();
        }
    };

    render();
</script>
</body>
</html>
